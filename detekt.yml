YawnDoctor:
  active: true
  QueryInsideLoop:
    active: true
    queryConstructors:
      - query
      - createYawnCriteria
      - createCriteria
    queryTerminals:
      - list
      - first
      - single
      - count
    iterationFunctions:
      - forEach
      - map
      - flatMap
      - associate
      - onEach

  MaterializedCount:
    active: true
    queryConstructors:
      - query
      - createYawnCriteria
      - createCriteria

  ExternalCallInsideTransaction:
    active: true
    transactionAnnotations:
      - Transactional
    transactionFunctions:
      - transaction
      - inTransaction
      - withTransaction
      - open
    suspiciousReceiverPatterns:
      - ".*Client"
      - ".*Publisher"
      - ".*Producer"
      - "httpClient"
    suspiciousMethodNames:
      - send
      - publish
      - post
      - execute
      - reserve
      - notify
      - sleep
